services:
  velxio:
    build:
      context: .
      dockerfile: Dockerfile.standalone
    container_name: velxio-app
    restart: unless-stopped
    ports:
      - "3080:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
